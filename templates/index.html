<!DOCTYPE html>
<html>
<head>
    <title>AI Finance Mentor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="app">

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">💰 FinMentor</div>
        <div class="chat-list">
            <div class="chat-item active">Personal Finance Chat</div>
        </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area">
        <div class="chat-header">AI Financial Advisor</div>

        <div id="chat-box" class="chat-box"></div>

        <div class="input-area">
            <input id="age" placeholder="Age">
            <input id="income" placeholder="Yearly Income">
            <input id="expenses" placeholder="Yearly Expenses">
            <input id="savings" placeholder="Yearly Savings">

            <select id="risk">
                <option>low</option>
                <option>medium</option>
                <option>high</option>
            </select>

            <button onclick="sendData()">➤</button>
        </div>
    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
